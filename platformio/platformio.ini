; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
default_envs = ATtiny1614


[env:ATtiny1614]
framework = arduino
platform = atmelmegaavr
board = ATtiny1614

board_build.mcu = attiny1614
;board_build.f_cpu = 16000000L
board_build.f_cpu = 20000000L

build_type = debug
;build_type = release

upload_port = COM10
;upload_speed = 115200
upload_speed = 230400
upload_protocol = serialupdi
upload_flags =
    -P$UPLOAD_PORT
    -b$UPLOAD_SPEED

monitor_port = COM8
monitor_speed = 115200

build_flags =
    # Debug
    -D DEBUG=true                           # Comment out or set false for no debug
    # Power button
    -D POWER_BUTTON_PIN=PIN_PA2             # Power button input pin
    -D POWER_BUTTON_DEBOUNCE_TIME=50        # Value in milliseconds(ms)
    -D POWER_BUTTON_HOLD_TIME=2000          # Value in milliseconds(ms)
    # Power led
    -D POWER_LED_PIN=PIN_PA3                # Power led pin
    # RaspberryPi 5
    -D RPI_POWER_INPUT_PIN=PIN_PA4          # High when RaspberryPi is running, low when it is in low power state
    -D RPI_POWER_BUTTON_OUTPUT_PIN=PIN_PA6  # RaspberryPi power button pin (Pinheader next to RTC battery connector)
    -D RPI_POWER_BUTTON_SIGNAL_LENGTH=250   # Value in milliseconds(ms), output signal length for Raspberry Pi power button
    -D RPI_OTHER_BUTTON_OUTPUT_PIN=PIN_PA7  # RaspberryPi GPIO pin
    -D RPI_OTHER_BUTTON_SIGNAL_LENGTH=250   # Value in milliseconds(ms), output signal length for Raspberry Pi power button
    # Sata led
    -D SATA_LED_PIN=PIN_PA5                 # Power button led pin
    # Pwm
    -D MCU_PWM_MAX=255                      # Depens on used microcontroller, usually 255 for arduino
    # Configuration
    -D FIRST_RUN_DONE_KEY=0x2E7C66A5        # Unsigned long(uint32) as HEX number
    # Eeprom
    -D EEPROM_ADDRESS_FIRST_RUN_DONE_KEY=32 # Eeprom address
    -D EEPROM_ADDRESS_CONFIG=64             # Eeprom address
    # Test mode
    -D TEST_MODE_DURATION=5000              # 5 seconds

lib_deps =

